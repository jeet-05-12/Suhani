
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Suhani ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #0f0f1a, #1a1a2e);
  color: #eee;
  text-align: center;
  overflow-x: hidden;
}

/* Glow Animation */
.glow {
  color: #ff4d6d;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from { text-shadow: 0 0 5px #ff4d6d; }
  to { text-shadow: 0 0 20px #ff4d6d, 0 0 30px #ff85a1; }
}

/* Lock Screen */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f0f1a;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

input, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

#introScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9;
}

#introText {
  font-family: 'Dancing Script', cursive;
  font-size: 3em;
  color: #ff4d6d;
  border-right: 3px solid #ff4d6d;
  white-space: nowrap;
  overflow: hidden;
}

button {
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* Main hidden */
#mainContent {
  display: none;
}

/* Hearts */
.hearts {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.heart {
  position: absolute;
  bottom: -20px;
  color: rgba(255, 77, 109, 0.6);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0.7; }
  100% { transform: translateY(-110vh); opacity: 0; }
}

/* Content */
.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
  position: relative;
}

.text {
  font-family: 'Dancing Script', cursive;
  font-size: 1.6em;
  line-height: 1.9;
  margin: 40px 0;
  color: #ffd1dc;

  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.typing {
  border-right: 2px solid #ffd1dc;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
  animation: blinkCursor 1s infinite;
}

@keyframes blinkCursor {
  0% { border-color: transparent; }
  50% { border-color: #ffd1dc; }
  100% { border-color: transparent; }
}

img {
  width: 100%;
  border-radius: 20px;
  margin: 20px 0;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* Popup */
#popup {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a2e;
  padding: 20px 30px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(255,77,109,0.5);
  display: none;
  font-size: 1.3em;
  color: #ff85a1;
}
</style>
</head>

<body>

<!-- Lock Screen -->
<div id="lockScreen">
  <h2>Enter Password 💖</h2>
  <input type="password" id="password" placeholder="Hint: your nickname 😉">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="introScreen" style="display:none;">
  <h1 id="introText" class="glow"></h1>
</div>

<!-- Hearts -->
<div class="hearts"></div>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Main Content -->
<div id="mainContent">
  <div class="container">
    <h1>Happy 2nd Anniversary, <span class="glow">Suhani</span> ❤️</h1>

    <div class="text" data-text="Suhani... you changed my life in ways I never imagined. You taught me to love.."></div>
    <img src="photo1.jpg">

    <div class="text" data-text="Every hug, every  moment with you feels soft, warm, and real."></div>
    <img src="photo2.jpg">

    <div class="text" data-text="Your arms are my favorite place to just sink in..."></div>
    <img src="photo3.jpg">

    <div class="text" data-text="I don't know how fast these 2 years went.. now it feels like I have known you since forever. With you, everything feels right."></div>
    <img src="photo4.jpg">

    <div class="text" data-text="I promise to love you in every phase, every mood, every day."></div>
    <img src="photo5.jpg">

    <div class="text" data-text="You are my peace, my chaos, my everything."></div>
    <img src="photo6.jpg">

    <div class="text" data-text="You have made it such that I can't imagine my day ending without talking to you.. or seeing you smile.. or enjoying your little dance breaks.."></div>
    <img src="photo7.jpg">

    <div class="text" data-text="You make our journey towards becoming CA's lighter.."></div>
    <img src="photo8.jpg">

    <div class="text" data-text="To many more years laughing, loving, dreaming, gossiping, cuddling, and a little bit of drama, with you.."></div>
    <img src="photo9.jpg">

    <div class="text" data-text="I will always be there for you. With love, yours and yours only..Ranjeet"></div>
    <img src="photo10.jpg">


<!-- Popup -->
<div id="popup">btw I love you MOREEEE</div>

<script>
// Unlock
function unlock() {
  const pass = document.getElementById("password").value;

  if(pass === "pudding") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("introScreen").style.display = "flex";

    typeIntroText("Suhani ❤️", () => {
      document.getElementById("introScreen").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
      document.getElementById("bgMusic").play();
    });

  } else {
    alert("Wrong password 😢");
  }
}

// Hearts
const heartsContainer = document.querySelector('.hearts');
function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  heart.style.animationDuration = (Math.random() * 6 + 6) + "s";
  heartsContainer.appendChild(heart);
  setTimeout(() => heart.remove(), 10000);
}
setInterval(createHeart, 400);

// Popup on scroll end
window.addEventListener("scroll", () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 10) {
    document.getElementById("popup").style.display = "block";
  }
});
const texts = document.querySelectorAll('.text');

function typeWriter(element, speed = 35) {
  const text = element.dataset.text;
  element.innerHTML = "";
  element.classList.add("typing");

  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      element.classList.remove("typing");
    }
  }

  typing();
}

function typeIntroText(text, callback) {
  const element = document.getElementById("introText");
  element.innerHTML = "";

  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 120);
    } else {
      setTimeout(callback, 1200); // pause before entering site
    }
  }

  typing();
}

function revealOnScroll() {
  const triggerBottom = window.innerHeight * 0.85;

  texts.forEach(text => {
    const top = text.getBoundingClientRect().top;

    if (top < triggerBottom && !text.classList.contains("visible")) {
      text.classList.add("visible");
      text.style.opacity = "1";
      text.style.transform = "translateY(0)";
      typeWriter(text);
    }
  });
}

window.addEventListener("scroll", revealOnScroll);
window.addEventListener("load", revealOnScroll);
</script>

</body>
</html>
